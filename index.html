<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Diagram</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#020617; font-family:'JetBrains Mono',monospace,sans-serif; overflow:hidden; height:100vh; color:#e2e8f0; }
#toolbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(2,6,23,0.92); border-bottom:1px solid #1e293b;
  backdrop-filter:blur(8px);
  display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem;
  flex-wrap:wrap;
}
#toolbar h1 { font-size:0.875rem; font-weight:700; color:#22d3ee; margin-right:0.5rem; flex-shrink:0; }
.sep { width:1px; height:24px; background:#1e293b; margin:0 0.25rem; }
.btn {
  font-family:inherit; font-size:0.7rem; padding:0.375rem 0.75rem;
  border-radius:0.375rem; border:1px solid #1e293b; cursor:pointer;
  background:rgba(30,41,59,0.5); color:#94a3b8;
  transition:all 0.15s; white-space:nowrap;
}
.btn:hover { background:rgba(30,41,59,0.9); color:#e2e8f0; border-color:#334155; }
.btn.active { background:rgba(34,211,238,0.15); color:#22d3ee; border-color:#22d3ee; }
.btn.danger { background:rgba(251,113,133,0.1); color:#fb7185; border-color:rgba(251,113,133,0.3); }
.btn.save { background:rgba(52,211,153,0.1); color:#34d399; border-color:rgba(52,211,153,0.3); }
.btn.save:hover { background:rgba(52,211,153,0.2); }
.btn:disabled { opacity:0.35; cursor:default; }
#status { font-size:0.65rem; color:#475569; }
#canvas { display:block; cursor:default; margin-top:41px; }
#modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
#modal-overlay.open { display:flex; }
#modal {
  background:#0f172a; border:1px solid #1e293b; border-radius:0.75rem;
  padding:1.5rem; min-width:320px; max-width:420px; width:100%;
}
#modal h2 { font-size:0.875rem; font-weight:600; margin-bottom:1rem; color:#e2e8f0; }
.field { margin-bottom:0.875rem; }
.field label { display:block; font-size:0.65rem; color:#64748b; margin-bottom:0.375rem; letter-spacing:0.05em; text-transform:uppercase; }
.field input, .field textarea {
  width:100%; font-family:inherit; font-size:0.75rem;
  background:#020617; border:1px solid #1e293b; border-radius:0.375rem;
  color:#e2e8f0; padding:0.5rem 0.75rem;
}
.field textarea { resize:vertical; min-height:60px; }
.field input:focus, .field textarea:focus { outline:none; border-color:#334155; }
.color-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.25rem; }
.color-swatch { width:24px; height:24px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:border-color 0.1s; }
.color-swatch.selected { border-color:#fff; }
.modal-actions { display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1rem; }
#ctx-menu {
  display:none; position:fixed; z-index:300;
  background:#0f172a; border:1px solid #1e293b; border-radius:0.5rem;
  padding:0.25rem; min-width:140px;
}
#ctx-menu.open { display:block; }
.ctx-item {
  font-family:inherit; font-size:0.7rem; padding:0.375rem 0.75rem;
  cursor:pointer; border-radius:0.25rem; color:#94a3b8;
  display:block; width:100%; text-align:left; background:none; border:none;
}
.ctx-item:hover { background:rgba(30,41,59,0.8); color:#e2e8f0; }
.ctx-item.red { color:#fb7185; }
.ctx-item.red:hover { background:rgba(251,113,133,0.1); }
#toast {
  position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
  background:#0f172a; border:1px solid #1e293b; border-radius:0.5rem;
  padding:0.5rem 1rem; font-size:0.7rem; color:#34d399;
  opacity:0; pointer-events:none; transition:opacity 0.2s; z-index:400;
}
#toast.show { opacity:1; }
#info-box {
  display:none; position:fixed; top:53px; right:12px; z-index:90;
  background:rgba(15,23,42,0.95); border:1px solid #1e293b; border-radius:0.5rem;
  padding:0.75rem 1rem; min-width:200px; max-width:260px;
  backdrop-filter:blur(8px);
}
#info-box.visible { display:block; }
#info-box-color { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle; }
#info-box-title { font-size:0.75rem; font-weight:600; color:#e2e8f0; margin-bottom:0.375rem; }
#info-box-meta { font-size:0.65rem; color:#64748b; line-height:1.6; white-space:pre; }
#info-box-actions { margin-top:0.5rem; display:flex; gap:0.375rem; }
#info-box-actions .btn { font-size:0.625rem; padding:0.25rem 0.5rem; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>⬡ CANVAS DIAGRAM</h1>
  <div class="sep"></div>
  <button class="btn" id="btn-add-component">+ Component</button>
  <button class="btn" id="btn-add-note">+ Note</button>
  <button class="btn" id="btn-add-area">⬚ Area</button>
  <button class="btn" id="btn-connect">⤳ Relation</button>
  <div class="sep"></div>
  <button class="btn danger" id="btn-delete" style="display:none">✕ Delete</button>
  <div class="sep"></div>
  <button class="btn" id="btn-snap">⊞ Snap</button>
  <button class="btn" id="btn-fit">⊡ Fit</button>
  <div class="sep"></div>
  <button class="btn" id="btn-undo" disabled>↩ Undo</button>
  <button class="btn" id="btn-redo" disabled>↷ Redo</button>
  <div class="sep"></div>
  <button class="btn" id="btn-export-png">↓ PNG</button>
  <button class="btn" id="btn-export-json">↓ JSON</button>
  <button class="btn" id="btn-import-json">↑ JSON</button>
  <div class="sep"></div>
  <button class="btn save" id="btn-save">↓ Save</button>
  <button class="btn" id="btn-reset">Reset</button>
  <span id="status"></span>
  <span style="margin-left:auto;font-size:0.6rem;color:#334155;flex-shrink:0">v2.4</span>
</div>
<canvas id="canvas"></canvas>
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">Add Component</h2>
    <div class="field">
      <label id="label-main">Name</label>
      <input type="text" id="modal-label" placeholder="e.g. API Server">
    </div>
    <div class="field" id="field-color">
      <label>Color</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <div class="field" id="field-note-text" style="display:none">
      <label>Note text</label>
      <textarea id="modal-note-text" placeholder="Notes, TODOs, observations..."></textarea>
    </div>
    <div class="field" id="field-edge-label" style="display:none">
      <label>Relation label</label>
      <input type="text" id="modal-edge-label" placeholder="e.g. REST/WS, HTTP, gRPC...">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn active" id="modal-ok">Add</button>
    </div>
  </div>
</div>
<div id="info-box">
  <div id="info-box-title"><span id="info-box-color"></span><span id="info-box-name"></span></div>
  <div id="info-box-meta"></div>
  <div id="info-box-actions">
    <button class="btn" id="info-edit">✎ Edit</button>
    <button class="btn danger" id="info-delete">✕</button>
  </div>
</div>
<div id="ctx-menu">
  <button class="ctx-item" id="ctx-edit">✎ Rename</button>
  <button class="ctx-item red" id="ctx-delete">✕ Delete</button>
</div>
<div id="toast"></div>
<script>
const COLORS = ['#22d3ee','#34d399','#818cf8','#a78bfa','#fb7185','#fb923c','#fbbf24','#38bdf8','#f472b6','#94a3b8'];
const NODE_W=160, NODE_H=54, NOTE_W=180, NOTE_H=70;
const STORAGE_KEY='canvas_diagram_v2';

let nodes=[], edges=[], groups=[];
let pan={x:80,y:60}, zoom=1;
let selected=null, dragging=null, panning=false, panStart={x:0,y:0};
let resizing=null;
let multiSelected=new Set();
let selBox=null;
let connectMode=false, connectFrom=null;
let dpr=window.devicePixelRatio||1;

// ── History (Undo/Redo) ───────────────────────────────────────
const MAX_HISTORY=50;
let history=[], future=[];
let clipboard=null;

function snapshot(){ return JSON.parse(JSON.stringify({nodes,edges,groups})); }

function pushHistory(){
  history.push(snapshot());
  if(history.length>MAX_HISTORY) history.shift();
  future=[];
  updateHistoryButtons();
}

function undo(){
  if(!history.length) return;
  future.push(snapshot());
  const s=history.pop();
  nodes=s.nodes; edges=s.edges; groups=s.groups;
  setSelected(null); save(); render(); toast('Undo ↩'); updateHistoryButtons();
}

function redo(){
  if(!future.length) return;
  history.push(snapshot());
  const s=future.pop();
  nodes=s.nodes; edges=s.edges; groups=s.groups;
  setSelected(null); save(); render(); toast('Redo ↷'); updateHistoryButtons();
}

function updateHistoryButtons(){
  document.getElementById('btn-undo').disabled=!history.length;
  document.getElementById('btn-redo').disabled=!future.length;
}

// ── Clipboard (Copy/Paste) ────────────────────────────────────
function copySelected(){
  let toCopy=[];
  if(multiSelected.size>0){
    toCopy=nodes.filter(n=>multiSelected.has(n.id));
  } else if(selected&&selected.type==='node'){
    const n=nodes.find(x=>x.id===selected.id);
    if(n) toCopy=[n];
  }
  if(!toCopy.length) return;
  clipboard=toCopy.map(n=>({...n}));
  toast(`Copied ${clipboard.length} node(s)`);
}

function pasteClipboard(){
  if(!clipboard||!clipboard.length) return;
  pushHistory();
  const newNodes=clipboard.map(n=>({...n,id:uid(),x:n.x+24,y:n.y+24}));
  nodes.push(...newNodes);
  multiSelected=new Set(newNodes.map(n=>n.id));
  setSelected(null);
  clipboard=newNodes.map(n=>({...n}));
  save(); render(); toast('Pasted');
}

// ── Canvas ────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function resize(){
  dpr=window.devicePixelRatio||1;
  const w=window.innerWidth, h=window.innerHeight-41;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  canvas.width=w*dpr; canvas.height=h*dpr;
  render();
}
window.addEventListener('resize',resize);

function screenToWorld(sx,sy){
  const r=canvas.getBoundingClientRect();
  return {x:(sx-r.left-pan.x)/zoom, y:(sy-r.top-pan.y)/zoom};
}

function nodeAt(wx,wy){
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    if(wx>=n.x&&wx<=n.x+n.w&&wy>=n.y&&wy<=n.y+n.h) return n;
  }
  return null;
}

function edgeNear(wx,wy){
  const T=Math.max(10, 16/zoom);
  for(let i=edges.length-1;i>=0;i--){
    const e=edges[i];
    const s=nodes.find(n=>n.id===e.from), d=nodes.find(n=>n.id===e.to);
    if(!s||!d) continue;
    const pts=bezPts(s,d);
    for(let t=0;t<=1;t+=0.02){
      const p=cubicB(pts,t);
      if(Math.hypot(p.x-wx,p.y-wy)<T) return e;
    }
  }
  return null;
}

function borderPt(n,fx,fy){
  const cx=n.x+n.w/2, cy=n.y+n.h/2;
  const dx=fx-cx, dy=fy-cy;
  if(!dx&&!dy) return {x:cx,y:cy};
  const hw=n.w/2+2, hh=n.h/2+2;
  const sx=hw/Math.abs(dx||1e-9), sy=hh/Math.abs(dy||1e-9);
  const sc=Math.min(sx,sy);
  return {x:cx+dx*sc, y:cy+dy*sc};
}

function bezPts(s,d){
  const sx=s.x+s.w/2, sy=s.y+s.h/2;
  const dx=d.x+d.w/2, dy=d.y+d.h/2;
  const p0=borderPt(s,dx,dy), p3=borderPt(d,sx,sy);
  const off=Math.min(Math.max(Math.hypot(dx-sx,dy-sy)*0.4,40),120);
  const a0=Math.atan2(sy-dy,sx-dx)+Math.PI;
  const a3=Math.atan2(dy-sy,dx-sx)+Math.PI;
  return {p0,p3,
    p1:{x:p0.x+Math.cos(a0)*off, y:p0.y+Math.sin(a0)*off},
    p2:{x:p3.x+Math.cos(a3)*off, y:p3.y+Math.sin(a3)*off}};
}

function cubicB({p0,p1,p2,p3},t){
  const m=1-t;
  return {x:m*m*m*p0.x+3*m*m*t*p1.x+3*m*t*t*p2.x+t*t*t*p3.x,
          y:m*m*m*p0.y+3*m*m*t*p1.y+3*m*t*t*p2.y+t*t*t*p3.y};
}

function render(){
  const W=canvas.width/dpr, H=canvas.height/dpr;
  ctx.save(); ctx.scale(dpr,dpr);
  ctx.fillStyle='#020617'; ctx.fillRect(0,0,W,H);
  drawGrid(W,H);
  ctx.save(); ctx.translate(pan.x,pan.y); ctx.scale(zoom,zoom);
  groups.forEach(drawGroup);
  edges.forEach(drawEdge);
  nodes.forEach(n=>{ drawNode(n, multiSelected.has(n.id)); });
  if(selBox){
    ctx.save();
    ctx.strokeStyle='rgba(34,211,238,0.8)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.strokeRect(selBox.x,selBox.y,selBox.w,selBox.h);
    ctx.fillStyle='rgba(34,211,238,0.05)'; ctx.fillRect(selBox.x,selBox.y,selBox.w,selBox.h);
    ctx.setLineDash([]); ctx.restore();
  }
  ctx.restore(); ctx.restore();
}

// ── Groups (areas) ────────────────────────────────────────────
const AREA_TITLE_H=22;

function drawGroup(g){
  const isSel=selected&&selected.type==='group'&&selected.id===g.id;
  ctx.save();
  ctx.fillStyle=hexAlpha(g.color,0.06);
  rrect(ctx,g.x,g.y,g.w,g.h,10); ctx.fill();
  ctx.strokeStyle=isSel?g.color:hexAlpha(g.color,0.55);
  ctx.lineWidth=isSel?2:1.5;
  ctx.setLineDash([8,5]);
  rrect(ctx,g.x,g.y,g.w,g.h,10); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=hexAlpha(g.color,0.15);
  ctx.beginPath();
  ctx.moveTo(g.x+10,g.y); ctx.lineTo(g.x+g.w-10,g.y);
  ctx.arcTo(g.x+g.w,g.y,g.x+g.w,g.y+10,10);
  ctx.lineTo(g.x+g.w,g.y+AREA_TITLE_H);
  ctx.lineTo(g.x,g.y+AREA_TITLE_H);
  ctx.lineTo(g.x,g.y+10);
  ctx.arcTo(g.x,g.y,g.x+10,g.y,10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=isSel?'#e2e8f0':hexAlpha(g.color,0.9);
  ctx.font='600 11px JetBrains Mono,monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(g.label, g.x+10, g.y+AREA_TITLE_H/2);
  const hx=g.x+g.w-8, hy=g.y+g.h-8;
  ctx.fillStyle=isSel?g.color:hexAlpha(g.color,0.4);
  ctx.beginPath(); ctx.arc(hx,hy,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16), gr=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${gr},${b},${a})`;
}

function groupTitleAt(wx,wy){
  for(let i=groups.length-1;i>=0;i--){
    const g=groups[i];
    if(wx>=g.x&&wx<=g.x+g.w&&wy>=g.y&&wy<=g.y+AREA_TITLE_H) return g;
  }
  return null;
}

function groupCornerAt(wx,wy){
  const T=12/zoom;
  for(let i=groups.length-1;i>=0;i--){
    const g=groups[i];
    if(Math.hypot(wx-(g.x+g.w),wy-(g.y+g.h))<T) return g;
  }
  return null;
}

function drawGrid(W,H){
  const sp=32*zoom;
  const ox=((pan.x%sp)+sp)%sp, oy=((pan.y%sp)+sp)%sp;
  ctx.fillStyle='rgba(30,41,59,0.55)';
  for(let x=ox;x<W;x+=sp) for(let y=oy;y<H;y+=sp) ctx.fillRect(x-1,y-1,2,2);
}

function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

function drawNode(n, isMSel=false){
  const isSel=(selected&&selected.type==='node'&&selected.id===n.id)||isMSel;
  const isCS=connectMode&&connectFrom===n.id;
  ctx.save();
  if(isSel||isCS){ ctx.shadowColor=isCS?'#fbbf24':n.color; ctx.shadowBlur=18; }
  ctx.fillStyle=n.type==='note'?'rgba(30,27,6,0.9)':'rgba(15,23,42,0.93)';
  rrect(ctx,n.x,n.y,n.w,n.h,8); ctx.fill();
  ctx.strokeStyle=isCS?'#fbbf24':(isSel?'#fff':n.color);
  ctx.lineWidth=isSel?2:1.5; ctx.globalAlpha=isSel?1:0.8;
  rrect(ctx,n.x,n.y,n.w,n.h,8); ctx.stroke(); ctx.globalAlpha=1; ctx.shadowBlur=0;
  if(n.type!=='note'){
    ctx.fillStyle=n.color; ctx.globalAlpha=0.3;
    ctx.beginPath(); ctx.moveTo(n.x+8,n.y); ctx.lineTo(n.x+n.w-8,n.y);
    ctx.arcTo(n.x+n.w,n.y,n.x+n.w,n.y+8,8); ctx.lineTo(n.x+n.w,n.y+4);
    ctx.lineTo(n.x,n.y+4); ctx.lineTo(n.x,n.y+8);
    ctx.arcTo(n.x,n.y,n.x+8,n.y,8); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
  }
  const lines=n.label.split('\n'), lh=14, th=lines.length*lh;
  const sy2=n.y+n.h/2-th/2+7;
  lines.forEach((l,i)=>{
    ctx.fillStyle=i===0&&n.type!=='note'?'#e2e8f0':'#94a3b8';
    ctx.font=`${i===0&&n.type!=='note'?'600 11px':'400 9.5px'} JetBrains Mono,monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(l,n.x+n.w/2,sy2+i*lh);
  });
  if(n.type==='note'){ ctx.font='12px sans-serif'; ctx.textAlign='left'; ctx.fillText('📝',n.x+6,n.y+14); }
  ctx.restore();
}

function drawEdge(e){
  const s=nodes.find(n=>n.id===e.from), d=nodes.find(n=>n.id===e.to);
  if(!s||!d) return;
  const isSel=selected&&selected.type==='edge'&&selected.id===e.id;
  const pts=bezPts(s,d);
  ctx.save();
  ctx.strokeStyle=isSel?'#e2e8f0':'rgba(100,116,139,0.65)';
  ctx.lineWidth=isSel?2:1.5; ctx.setLineDash(isSel?[]:[5,4]);
  ctx.beginPath(); ctx.moveTo(pts.p0.x,pts.p0.y);
  ctx.bezierCurveTo(pts.p1.x,pts.p1.y,pts.p2.x,pts.p2.y,pts.p3.x,pts.p3.y);
  ctx.stroke(); ctx.setLineDash([]);
  const pN=cubicB(pts,0.97);
  const ang=Math.atan2(pts.p3.y-pN.y,pts.p3.x-pN.x), AS=10;
  ctx.fillStyle=isSel?'#e2e8f0':'rgba(100,116,139,0.85)';
  ctx.beginPath();
  ctx.moveTo(pts.p3.x,pts.p3.y);
  ctx.lineTo(pts.p3.x-AS*Math.cos(ang-0.4),pts.p3.y-AS*Math.sin(ang-0.4));
  ctx.lineTo(pts.p3.x-AS*Math.cos(ang+0.4),pts.p3.y-AS*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
  if(e.label){
    const mid=cubicB(pts,0.5);
    ctx.font='9px JetBrains Mono,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const lw2=ctx.measureText(e.label).width;
    ctx.fillStyle='rgba(2,6,23,0.88)'; ctx.fillRect(mid.x-lw2/2-3,mid.y-7,lw2+6,14);
    ctx.fillStyle=isSel?'#e2e8f0':'#64748b'; ctx.fillText(e.label,mid.x,mid.y);
  }
  ctx.restore();
}

function uid(){ return Math.random().toString(36).slice(2,10); }

function defaultDiagram(){
  return {
    nodes:[
      {id:'n1',type:'component',x:40,  y:220,w:NODE_W,h:NODE_H,label:'Client\n(Browser)',color:'#22d3ee'},
      {id:'n2',type:'component',x:280, y:140,w:NODE_W,h:NODE_H,label:'API Gateway\n:443 HTTPS',color:'#94a3b8'},
      {id:'n3',type:'component',x:280, y:300,w:NODE_W,h:NODE_H,label:'Load Balancer\nround-robin',color:'#64748b'},
      {id:'n4',type:'component',x:520, y:220,w:NODE_W,h:NODE_H,label:'App Server\n:8000',color:'#818cf8'},

      {id:'n7',type:'component',x:760, y:320,w:NODE_W,h:NODE_H,label:'Cache\nRedis',color:'#a78bfa'},

      {id:'n9',type:'component',x:520, y:420,w:NODE_W,h:NODE_H,label:'Worker\nasync jobs',color:'#38bdf8'},

}

function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify({nodes,edges,groups})); toast('Saved ✓'); }

function load(){
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){ const d=JSON.parse(raw); nodes=d.nodes||[]; edges=d.edges||[]; groups=d.groups||[]; return; }
  } catch(e){}
  const d=defaultDiagram(); nodes=d.nodes; edges=d.edges; groups=d.groups||[];
}

function resetDiagram(){
  if(!confirm('Reset to default diagram?')) return;
  pushHistory();
  localStorage.removeItem(STORAGE_KEY);
  const d=defaultDiagram(); nodes=d.nodes; edges=d.edges; groups=d.groups||[];
  selected=null; render();
}

// ── Zoom to fit ───────────────────────────────────────────────
function zoomFit(){
  const all=[...nodes, ...groups];
  if(!all.length) return;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  all.forEach(n=>{
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+(n.w||0)); maxY=Math.max(maxY,n.y+(n.h||0));
  });
  const pad=60;
  const W=canvas.clientWidth, H=canvas.clientHeight;
  const dw=maxX-minX||1, dh=maxY-minY||1;
  zoom=Math.min((W-pad*2)/dw, (H-pad*2)/dh, 2);
  pan.x=pad-minX*zoom+(W-pad*2-dw*zoom)/2;
  pan.y=pad-minY*zoom+(H-pad*2-dh*zoom)/2;
  render();
}

// ── Export PNG ────────────────────────────────────────────────
function exportPNG(){
  const link=document.createElement('a');
  link.download='diagram.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

// ── Export/Import JSON ────────────────────────────────────────
function exportJSON(){
  const data=JSON.stringify({nodes,edges,groups},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.download='diagram.json'; link.href=url; link.click();
  URL.revokeObjectURL(url);
}

function importJSON(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        pushHistory();
        const d=JSON.parse(ev.target.result);
        nodes=d.nodes||[]; edges=d.edges||[]; groups=d.groups||[];
        setSelected(null); save(); render(); toast('JSON imported ✓');
      } catch{ toast('JSON import error'); }
    };
    reader.readAsText(file);
  });
  input.click();
}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

function setSelected(s){
  selected=s;
  document.getElementById('btn-delete').style.display=s?'':'none';
  updateInfoBox(s);
  render();
}

function updateInfoBox(s){
  const box=document.getElementById('info-box');
  if(!s){ box.classList.remove('visible'); return; }
  box.classList.add('visible');
  const colorEl=document.getElementById('info-box-color');
  const nameEl=document.getElementById('info-box-name');
  const metaEl=document.getElementById('info-box-meta');
  if(s.type==='group'){
    const g=groups.find(x=>x.id===s.id);
    if(!g){ box.classList.remove('visible'); return; }
    colorEl.style.background=g.color;
    nameEl.textContent=g.label;
    metaEl.textContent=`Area: ${Math.round(g.w)}×${Math.round(g.h)}\nPos: ${Math.round(g.x)}, ${Math.round(g.y)}`;
  } else if(s.type==='node'){
    const n=nodes.find(x=>x.id===s.id);
    if(!n){ box.classList.remove('visible'); return; }
    colorEl.style.background=n.color;
    nameEl.textContent=n.label.replace('\n',' · ');
    const conns=edges.filter(e=>e.from===n.id||e.to===n.id).length;
    metaEl.textContent=`Type: ${n.type}\nEdges: ${conns}\nPos: ${Math.round(n.x)}, ${Math.round(n.y)}`;
  } else {
    const e=edges.find(x=>x.id===s.id);
    if(!e){ box.classList.remove('visible'); return; }
    const src=nodes.find(n=>n.id===e.from), dst=nodes.find(n=>n.id===e.to);
    colorEl.style.background='#64748b';
    nameEl.textContent=e.label||'(no label)';
    metaEl.textContent=`From: ${src?.label.split('\n')[0]||'?'}\nTo: ${dst?.label.split('\n')[0]||'?'}`;
  }
}

document.getElementById('info-edit').addEventListener('click',()=>{
  if(!selected) return;
  if(selected.type==='group'){ const g=groups.find(x=>x.id===selected.id); if(g) openModal('area',g); }
  else if(selected.type==='node'){ const n=nodes.find(x=>x.id===selected.id); if(n) openModal(n.type,n); }
  else { const e=edges.find(x=>x.id===selected.id); if(e) openModal('edge',{...e,_isEdge:true}); }
});
document.getElementById('info-delete').addEventListener('click',deleteSelected);

function deleteSelected(){
  if(!selected) return;
  pushHistory();
  if(selected.type==='node'){
    nodes=nodes.filter(n=>n.id!==selected.id);
    edges=edges.filter(e=>e.from!==selected.id&&e.to!==selected.id);
  } else if(selected.type==='group'){
    groups=groups.filter(g=>g.id!==selected.id);
  } else {
    edges=edges.filter(e=>e.id!==selected.id);
  }
  setSelected(null); save();
}

function toggleConnect(){
  connectMode=!connectMode; connectFrom=null;
  document.getElementById('btn-connect').classList.toggle('active',connectMode);
  canvas.style.cursor=connectMode?'crosshair':'default';
  setStatus(connectMode?'Click source node...':'');
  render();
}

function setStatus(msg){
  document.getElementById('status').textContent=msg||'Pan: drag · Zoom: wheel · DblClick: rename · RightClick: options · Ctrl+Z/Y: undo/redo · Ctrl+C/V: copy/paste';
}

let modalMode='component', pendingEdit=null;
const SNAP_GRID=32;

function snapAll(){
  pushHistory();
  nodes.forEach(n=>{
    n.x=Math.round(n.x/SNAP_GRID)*SNAP_GRID;
    n.y=Math.round(n.y/SNAP_GRID)*SNAP_GRID;
  });
  save(); render(); toast('Snap ✓');
}

function initSwatches(currentColor){
  const row=document.getElementById('color-row'); row.innerHTML='';
  COLORS.forEach((c)=>{
    const s=document.createElement('div');
    const isSel=c===(currentColor||COLORS[0]);
    s.className='color-swatch'+(isSel?' selected':'');
    s.style.background=c; s.dataset.color=c;
    s.addEventListener('click',()=>{ row.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('selected')); s.classList.add('selected'); });
    row.appendChild(s);
  });
}

function selColor(){ const s=document.querySelector('.color-swatch.selected'); return s?s.dataset.color:COLORS[0]; }

function openModal(mode,editTarget=null){
  modalMode=mode; pendingEdit=editTarget;
  const isEdge=editTarget&&editTarget._isEdge;
  const isEdit=!!editTarget;

  document.getElementById('modal-ok').textContent=isEdit?'Save':'Add';
  const mainField=document.getElementById('modal-label').closest('.field');
  if(mainField) mainField.style.display=isEdge?'none':'';
  document.getElementById('field-color').style.display=(mode==='note'||isEdge)?'none':'';
  document.getElementById('field-note-text').style.display=mode==='note'?'':'none';
  document.getElementById('field-edge-label').style.display=isEdge?'':'none';

  if(isEdge){
    document.getElementById('modal-title').textContent='Relation label';
    document.getElementById('modal-edge-label').value=editTarget.label||'';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('modal-edge-label').focus(),50);
    return;
  }

  const titles={note:isEdit?'Edit Note':'Add Note', area:isEdit?'Edit Area':'Add Area', component:isEdit?'Edit Component':'Add Component'};
  document.getElementById('modal-title').textContent=titles[mode]||'Add';
  document.getElementById('modal-label').value=isEdit?editTarget.label.split('\n')[0]:'';
  document.getElementById('modal-note-text').value=isEdit&&mode==='note'?editTarget.label:'';
  initSwatches(isEdit?editTarget.color:null);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>(mode==='note'?document.getElementById('modal-note-text'):document.getElementById('modal-label')).focus(),50);
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); pendingEdit=null; }

function submitModal(){
  if(pendingEdit){
    if(pendingEdit._isEdge){
      const lbl=document.getElementById('modal-edge-label').value.trim();
      const orig=edges.find(e=>e.id===pendingEdit.id);
      if(orig){ pushHistory(); orig.label=lbl; }
      save(); render(); closeModal(); return;
    }
    const lbl=modalMode==='note'
      ?document.getElementById('modal-note-text').value.trim()
      :document.getElementById('modal-label').value.trim();
    pushHistory();
    if(lbl) pendingEdit.label=lbl;
    if(modalMode!=='note') pendingEdit.color=selColor();
    save(); render(); closeModal(); return;
  }
  const r=canvas.getBoundingClientRect();
  const cx=(r.width/2-pan.x)/zoom, cy=(r.height/2-pan.y)/zoom;
  pushHistory();
  if(modalMode==='area'){
    const lbl=document.getElementById('modal-label').value.trim();
    if(!lbl){ closeModal(); return; }
    groups.push({id:uid(),x:cx-160,y:cy-100,w:320,h:200,label:lbl,color:selColor()});
    save(); render(); closeModal(); return;
  }
  if(modalMode==='note'){
    const txt=document.getElementById('modal-note-text').value.trim();
    if(!txt){ closeModal(); return; }
    nodes.push({id:uid(),type:'note',x:cx-NOTE_W/2,y:cy-NOTE_H/2,w:NOTE_W,h:NOTE_H,label:txt,color:'#fbbf24'});
  } else {
    const lbl=document.getElementById('modal-label').value.trim();
    if(!lbl){ closeModal(); return; }
    nodes.push({id:uid(),type:'component',x:cx-NODE_W/2,y:cy-NODE_H/2,w:NODE_W,h:NODE_H,label:lbl,color:selColor()});
  }
  save(); render(); closeModal();
}

let ctxTarget=null;
function showCtx(x,y,target){
  ctxTarget=target;
  const m=document.getElementById('ctx-menu');
  m.style.left=x+'px'; m.style.top=y+'px'; m.classList.add('open');
  document.getElementById('ctx-edit').style.display='';
}
function hideCtx(){ document.getElementById('ctx-menu').classList.remove('open'); ctxTarget=null; }

canvas.addEventListener('mousedown',e=>{
  hideCtx();
  if(e.button===1){ e.preventDefault(); return; }
  const w=screenToWorld(e.clientX,e.clientY);
  const hit=nodeAt(w.x,w.y);
  if(e.button===2){
    const he=!hit?edgeNear(w.x,w.y):null;
    const gt=(!hit&&!he)?groupTitleAt(w.x,w.y):null;
    if(hit){ setSelected({type:'node',id:hit.id}); showCtx(e.clientX,e.clientY,hit); }
    else if(he){ setSelected({type:'edge',id:he.id}); showCtx(e.clientX,e.clientY,{...he,_isEdge:true}); }
    else if(gt){ setSelected({type:'group',id:gt.id}); showCtx(e.clientX,e.clientY,{...gt,_isGroup:true}); }
    return;
  }
  if(connectMode){
    if(hit){
      if(!connectFrom){ connectFrom=hit.id; setStatus('Click target node...'); render(); }
      else if(connectFrom!==hit.id){
        if(!edges.find(ex=>ex.from===connectFrom&&ex.to===hit.id)){
          pushHistory();
          edges.push({id:uid(),from:connectFrom,to:hit.id,label:''});
        }
        connectFrom=null; setStatus('Relation added.'); save(); render();
      }
    }
    return;
  }
  if(hit && e.shiftKey){
    if(multiSelected.has(hit.id)) multiSelected.delete(hit.id);
    else multiSelected.add(hit.id);
    render(); return;
  }
  if(hit && multiSelected.size>0 && multiSelected.has(hit.id)){
    pushHistory();
    const offsets=new Map();
    nodes.filter(n=>multiSelected.has(n.id)).forEach(n=>offsets.set(n.id,{ox:w.x-n.x,oy:w.y-n.y}));
    dragging={multi:true,offsets};
    canvas.style.cursor='grabbing';
  } else if(hit){
    pushHistory();
    multiSelected.clear();
    setSelected({type:'node',id:hit.id});
    nodes=nodes.filter(n=>n.id!==hit.id); nodes.push(hit);
    dragging={node:hit,ox:w.x-hit.x,oy:w.y-hit.y};
    canvas.style.cursor='grabbing';
  } else if(e.shiftKey && !connectMode){
    selBox={x:w.x,y:w.y,w:0,h:0,sx:w.x,sy:w.y};
    multiSelected.clear(); setSelected(null);
  } else {
    const gc=groupCornerAt(w.x,w.y);
    if(gc){
      pushHistory();
      setSelected({type:'group',id:gc.id});
      resizing={group:gc,ox:w.x,oy:w.y,gx:gc.x,gy:gc.y,gw:gc.w,gh:gc.h};
      canvas.style.cursor='se-resize';
    } else {
      const gt=groupTitleAt(w.x,w.y);
      if(gt){
        pushHistory();
        setSelected({type:'group',id:gt.id});
        dragging={group:gt,ox:w.x-gt.x,oy:w.y-gt.y};
        canvas.style.cursor='grabbing';
      } else {
        const he=edgeNear(w.x,w.y);
        if(he) setSelected({type:'edge',id:he.id});
        else{ setSelected(null); panning=true; panStart={x:e.clientX-pan.x,y:e.clientY-pan.y}; canvas.style.cursor='grabbing'; }
      }
    }
  }
});

canvas.addEventListener('mousemove',e=>{
  const w=screenToWorld(e.clientX,e.clientY);
  if(dragging){
    if(dragging.multi){
      nodes.filter(n=>multiSelected.has(n.id)).forEach(n=>{
        const o=dragging.offsets.get(n.id);
        if(o){ n.x=w.x-o.ox; n.y=w.y-o.oy; }
      });
    } else if(dragging.node){ dragging.node.x=w.x-dragging.ox; dragging.node.y=w.y-dragging.oy; }
    else if(dragging.group){ dragging.group.x=w.x-dragging.ox; dragging.group.y=w.y-dragging.oy; }
    render();
  } else if(selBox){
    selBox.w=w.x-selBox.sx; selBox.h=w.y-selBox.sy;
    selBox.x=selBox.w<0?w.x:selBox.sx; selBox.y=selBox.h<0?w.y:selBox.sy;
    const bx=Math.min(selBox.sx,w.x), by=Math.min(selBox.sy,w.y);
    const bx2=Math.max(selBox.sx,w.x), by2=Math.max(selBox.sy,w.y);
    multiSelected=new Set(nodes.filter(n=>n.x+n.w>bx&&n.x<bx2&&n.y+n.h>by&&n.y<by2).map(n=>n.id));
    render();
  } else if(resizing){
    const g=resizing.group;
    g.w=Math.max(80, resizing.gw+(w.x-resizing.ox));
    g.h=Math.max(50, resizing.gh+(w.y-resizing.oy));
    render();
  } else if(panning){ pan.x=e.clientX-panStart.x; pan.y=e.clientY-panStart.y; render(); }
  else if(!connectMode){
    if(groupCornerAt(w.x,w.y)) canvas.style.cursor='se-resize';
    else if(groupTitleAt(w.x,w.y)) canvas.style.cursor='grab';
    else canvas.style.cursor=nodeAt(w.x,w.y)?'grab':'default';
  }
});

canvas.addEventListener('mouseup',()=>{
  if(dragging||resizing) save();
  dragging=null; resizing=null; panning=false; selBox=null;
  if(!connectMode) canvas.style.cursor='default';
  render();
});
canvas.addEventListener('mouseleave',()=>{ dragging=null; panning=false; });

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const f=e.deltaY<0?1.1:0.9, nz=Math.min(Math.max(zoom*f,0.15),5);
  pan.x=mx-(mx-pan.x)*(nz/zoom); pan.y=my-(my-pan.y)*(nz/zoom); zoom=nz; render();
},{passive:false});

canvas.addEventListener('dblclick',e=>{
  e.preventDefault();
  const w=screenToWorld(e.clientX,e.clientY);
  const hit=nodeAt(w.x,w.y);
  if(hit){ openModal(hit.type,hit); return; }
  let he=edgeNear(w.x,w.y);
  if(!he && selected && selected.type==='edge'){
    he=edges.find(x=>x.id===selected.id)||null;
  }
  if(he) openModal('edge',{...he,_isEdge:true});
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='Delete'||e.key==='Backspace') deleteSelected();
  if(e.key==='Escape'){ if(connectMode) toggleConnect(); setSelected(null); hideCtx(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){ e.preventDefault(); save(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='z'){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='y'){ e.preventDefault(); redo(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='c'){ e.preventDefault(); copySelected(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='v'){ e.preventDefault(); pasteClipboard(); }
});

document.getElementById('btn-add-note').addEventListener('click',()=>openModal('note'));
document.getElementById('btn-add-area').addEventListener('click',()=>openModal('area'));
document.getElementById('btn-connect').addEventListener('click',toggleConnect);
document.getElementById('btn-delete').addEventListener('click',deleteSelected);
document.getElementById('btn-snap').addEventListener('click',snapAll);
document.getElementById('btn-fit').addEventListener('click',zoomFit);
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);
document.getElementById('btn-export-png').addEventListener('click',exportPNG);
document.getElementById('btn-export-json').addEventListener('click',exportJSON);
document.getElementById('btn-import-json').addEventListener('click',importJSON);
document.getElementById('btn-save').addEventListener('click',save);
document.getElementById('btn-reset').addEventListener('click',resetDiagram);
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-ok').addEventListener('click',submitModal);
document.getElementById('modal-label').addEventListener('keydown',e=>{ if(e.key==='Enter') submitModal(); });
document.getElementById('modal-edge-label').addEventListener('keydown',e=>{ if(e.key==='Enter') submitModal(); });
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });
document.getElementById('ctx-edit').addEventListener('click',()=>{
  if(!ctxTarget) return; hideCtx();
  if(ctxTarget._isEdge) openModal('edge', ctxTarget);
  else if(ctxTarget._isGroup) openModal('area', ctxTarget);
  else openModal(ctxTarget.type||'component', ctxTarget);
});
document.getElementById('ctx-delete').addEventListener('click',()=>{
  if(!ctxTarget) return;
  pushHistory();
  if(ctxTarget._isEdge){ edges=edges.filter(e=>e.id!==ctxTarget.id); }
  else if(ctxTarget._isGroup){ groups=groups.filter(g=>g.id!==ctxTarget.id); }
  else { nodes=nodes.filter(n=>n.id!==ctxTarget.id); edges=edges.filter(e=>e.from!==ctxTarget.id&&e.to!==ctxTarget.id); }
  hideCtx(); setSelected(null); save(); render();
});
document.addEventListener('click',e=>{ if(!document.getElementById('ctx-menu').contains(e.target)) hideCtx(); });

load(); resize(); setStatus(); updateHistoryButtons();
